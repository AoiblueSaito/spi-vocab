    * { box-sizing: border-box; }
    body {
      margin: 0;

      background: #f5f7fb;
      color: #111827;
    }
    .app {
      max-width: 520px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 18px 16px 34px;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    h1 {
      font-size: 22px;
      margin: 0;
    }
    .pill {
      background: #e0ecff;
      color: #1d4ed8;
      padding: 7px 10px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 13px;
    }
    .card {
      background: white;
      border-radius: 22px;
      padding: 22px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, .08);
      margin-top: 12px;
    }
    .progress {
      height: 10px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0 20px;
    }
    .bar {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width .25s;
    }
    .meta {
      font-size: 14px;
      color: #6b7280;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
    }
    .word {
      text-align: center;
      margin: 20px 0 8px;
      font-size: 44px;
      font-weight: 900;
      letter-spacing: .04em;
    }
    .reading {
      text-align: center;
      font-size: 18px;
      color: #64748b;
      margin-bottom: 22px;
      font-weight: 700;
    }
    .choices {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    button {
      font: inherit;
      border: 0;
      border-radius: 16px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .choice {
      width: 100%;
      text-align: left;
      padding: 16px 16px;
      background: #f8fafc;
      border: 2px solid #e5e7eb;
      font-weight: 700;
      line-height: 1.5;
      min-height: 64px;
    }
    .choice:active { transform: scale(.99); }
    .choice.correct {
      background: #dcfce7;
      border-color: #22c55e;
    }
    .choice.wrong {
      background: #fee2e2;
      border-color: #ef4444;
    }
    .feedback {
      min-height: 30px;
      margin-top: 14px;
      font-weight: 900;
      text-align: center;
      font-size: 18px;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }
    .primary {
      background: #2563eb;
      color: white;
      padding: 15px;
      font-weight: 900;
    }
    .secondary {
      background: #e5e7eb;
      color: #111827;
      padding: 15px;
      font-weight: 900;
    }
    .wide {
      width: 100%;
      margin-top: 10px;
    }
    .danger {
      background: #fee2e2;
      color: #991b1b;
      padding: 15px;
      font-weight: 900;
    }
    .small {
      font-size: 13px;
      color: #6b7280;
      text-align: center;
      margin-top: 14px;
      line-height: 1.6;
    }
    .hidden { display: none; }
    .result-number {
      font-size: 54px;
      font-weight: 900;
      text-align: center;
      margin: 12px 0;
    }
    .review-list {
      display: grid;
      gap: 10px;
      margin-top: 16px;
    }
    .review-item {
      background: #f8fafc;
      border-radius: 14px;
      padding: 12px;
      line-height: 1.5;
    }
    .review-item b { font-size: 18px; }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <h1>🎯 SPI語句4択</h1>
      <div class="pill" id="scorePill">0 / 0</div>
    </header>

    <section class="card" id="quizCard">
      <div class="meta">
        <span id="qNo">第1問</span>
        <span id="totalNo">全問</span>
      </div>
      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="word" id="word">語句</div>
      <div class="reading" id="reading">よみ</div>
      <div class="choices" id="choices"></div>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="secondary" id="restartBtn">最初から</button>
        <button class="primary" id="nextBtn">次へ</button>
      </div>
      <button class="secondary wide" id="historyOpenBtn">過去にミスった問題を見る</button>
      <p class="small">語句に合う意味を4択から選んでください。ミスした問題は端末に保存されます。</p>
    </section>

    <section class="card hidden" id="resultCard">
      <h2 style="text-align:center;margin:0;">結果</h2>
      <div class="result-number" id="resultText">0%</div>
      <p style="text-align:center;font-weight:800;" id="resultSub"></p>
      <div class="actions">
        <button class="secondary" id="reviewBtn">間違いだけ復習</button>
        <button class="primary" id="againBtn">もう一度</button>
      </div>
      <div class="review-list" id="reviewList"></div>
    </section>

    <section class="card hidden" id="historyCard">
      <h2 style="text-align:center;margin:0;">過去にミスった問題</h2>
      <p style="text-align:center;font-weight:800;" id="historySub"></p>
      <div class="actions">
        <button class="secondary" id="historyBackBtn">戻る</button>
        <button class="primary" id="historyQuizBtn">これだけ復習</button>
      </div>
      <button class="danger wide" id="historyClearBtn">履歴をリセット</button>
      <div class="review-list" id="historyList"></div>
    </section>
  </main>

const MISS_KEY = "spi_vocab_missed_history_v1";

function getMissHistory() {
  try {
    return JSON.parse(localStorage.getItem(MISS_KEY) || "[]");
  } catch (e) {
    return [];
  }
}

function saveMiss(wordObj) {
  const history = getMissHistory();
  const key = wordObj.word + "|" + (wordObj.reading || "");
  const existingIndex = history.findIndex(w => (w.word + "|" + (w.reading || "")) === key);
  const saved = {
    word: wordObj.word,
    reading: wordObj.reading || "",
    meaning: wordObj.meaning,
    missedCount: 1,
    lastMissedAt: new Date().toLocaleString("ja-JP")
  };
  if (existingIndex >= 0) {
    saved.missedCount = (history[existingIndex].missedCount || 1) + 1;
    history.splice(existingIndex, 1);
  }
  history.unshift(saved);
  localStorage.setItem(MISS_KEY, JSON.stringify(history));
}

function clearMissHistory() {
  localStorage.removeItem(MISS_KEY);
}

let questions = [];
let index = 0;
let correctCount = 0;
let answered = false;
let missed = [];

const wordEl = document.getElementById("word");
const readingEl = document.getElementById("reading");
const choicesEl = document.getElementById("choices");
const feedbackEl = document.getElementById("feedback");
const qNoEl = document.getElementById("qNo");
const totalNoEl = document.getElementById("totalNo");
const scorePill = document.getElementById("scorePill");
const bar = document.getElementById("bar");
const nextBtn = document.getElementById("nextBtn");
const restartBtn = document.getElementById("restartBtn");
const quizCard = document.getElementById("quizCard");
const resultCard = document.getElementById("resultCard");
const resultText = document.getElementById("resultText");
const resultSub = document.getElementById("resultSub");
const reviewList = document.getElementById("reviewList");
const historyCard = document.getElementById("historyCard");
const historyList = document.getElementById("historyList");
const historySub = document.getElementById("historySub");

function shuffle(array) {
  const a = [...array];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function makeQuestions(source = WORDS) {
  questions = shuffle(source);
  index = 0;
  correctCount = 0;
  missed = [];
  answered = false;
  quizCard.classList.remove("hidden");
  resultCard.classList.add("hidden");
  showQuestion();
}

function showQuestion() {
  answered = false;
  feedbackEl.textContent = "";
  const q = questions[index];
  wordEl.textContent = q.word;
  readingEl.textContent = q.reading;
  qNoEl.textContent = `第${index + 1}問`;
  totalNoEl.textContent = `全${questions.length}問`;
  scorePill.textContent = `${correctCount} / ${index}`;
  bar.style.width = `${(index / questions.length) * 100}%`;

  const wrongs = shuffle(WORDS.filter(w => w.meaning !== q.meaning)).slice(0, 3);
  const options = shuffle([q, ...wrongs]);
  choicesEl.innerHTML = "";
  options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = opt.meaning;
    btn.onclick = () => answer(btn, opt.meaning === q.meaning);
    choicesEl.appendChild(btn);
  });
}

function answer(btn, isCorrect) {
  if (answered) return;
  answered = true;
  const q = questions[index];
  const buttons = [...document.querySelectorAll(".choice")];
  buttons.forEach(b => {
    if (b.textContent === q.meaning) b.classList.add("correct");
  });
  if (isCorrect) {
    correctCount++;
    feedbackEl.textContent = "正解！";
    feedbackEl.style.color = "#16a34a";
  } else {
    btn.classList.add("wrong");
    missed.push(q);
    saveMiss(q);
    feedbackEl.textContent = "不正解";
    feedbackEl.style.color = "#dc2626";
  }
  scorePill.textContent = `${correctCount} / ${index + 1}`;
}

function nextQuestion() {
  if (!answered) {
    feedbackEl.textContent = "先に選択してください";
    feedbackEl.style.color = "#6b7280";
    return;
  }
  index++;
  if (index >= questions.length) {
    showResult();
  } else {
    showQuestion();
  }
}

function showResult() {
  quizCard.classList.add("hidden");
  resultCard.classList.remove("hidden");
  const percent = Math.round((correctCount / questions.length) * 100);
  resultText.textContent = `${percent}%`;
  resultSub.textContent = `${questions.length}問中 ${correctCount}問正解`;
  bar.style.width = "100%";
  reviewList.innerHTML = "";
  if (missed.length === 0) {
    reviewList.innerHTML = '<div class="review-item">全問正解です。</div>';
  } else {
    missed.forEach(w => {
      const div = document.createElement("div");
      div.className = "review-item";
      div.innerHTML = `<b>${w.word}</b>（${w.reading}）<br>${w.meaning}`;
      reviewList.appendChild(div);
    });
  }
}

function showHistory() {
  const history = getMissHistory();
  quizCard.classList.add("hidden");
  resultCard.classList.add("hidden");
  historyCard.classList.remove("hidden");

  historySub.textContent = history.length === 0
    ? "まだ履歴はありません"
    : `${history.length}語を保存中`;

  historyList.innerHTML = "";
  if (history.length === 0) {
    historyList.innerHTML = '<div class="review-item">問題を間違えると、ここに自動で保存されます。</div>';
    return;
  }

  history.forEach(w => {
    const div = document.createElement("div");
    div.className = "review-item";
    div.innerHTML = `<b>${w.word}</b>${w.reading ? `（${w.reading}）` : ""}<br>${w.meaning}<br><span style="color:#64748b;font-size:13px;">ミス ${w.missedCount || 1}回 / 最終: ${w.lastMissedAt || "-"}</span>`;
    historyList.appendChild(div);
  });
}

function backFromHistory() {
  historyCard.classList.add("hidden");
  quizCard.classList.remove("hidden");
}

nextBtn.onclick = nextQuestion;
restartBtn.onclick = () => makeQuestions();
document.getElementById("againBtn").onclick = () => makeQuestions();
document.getElementById("reviewBtn").onclick = () => {
  if (missed.length > 0) makeQuestions(missed);
};
document.getElementById("historyOpenBtn").onclick = showHistory;
document.getElementById("historyBackBtn").onclick = backFromHistory;
document.getElementById("historyQuizBtn").onclick = () => {
  const history = getMissHistory();
  if (history.length > 0) makeQuestions(history);
};
document.getElementById("historyClearBtn").onclick = () => {
  if (confirm("過去にミスった問題の履歴を削除しますか？")) {
    clearMissHistory();
    showHistory();
  }
};
